<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一話：タイトル - 玩具の部屋</title>
    <style>
        body { 
            font-family: "sans-serif"; 
            line-height: 1.8; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            color: #222; 
            background: #fff; 
        }

        /* 右上の「下へ」ボタン */
        .jump-link {
            text-align: right;
            margin-bottom: 10px;
        }
        .jump-link a {
            font-size: 14px;
            color: #777;
            background: #f0f0f0;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* 本文タイトル */
        .content-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #444;
            border-left: 8px solid #f8b500;
            padding-left: 15px;
        }

        /* 本文エリア：ゴシック体、23文字程度に調整 */
        .novel-body {
            font-family: "sans-serif"; /* ゴシック体 */
            font-size: 17.5px;        /* スマホで約23文字収まるサイズ */
            white-space: pre-wrap;    /* メモ帳の改行をそのまま反映する魔法 */
            word-wrap: break-word;
            color: #333;
        }

        /* 下部ナビゲーション */
        .bottom-nav {
            text-align: center;
            margin-top: 100px;
            padding-bottom: 80px;
            border-top: 1px solid #eee;
        }
        .bottom-nav a {
            display: block;
            text-decoration: none;
            margin: 20px 0;
            font-weight: bold;
        }
        .go-top { font-size: 14px; color: #777; }
        .back-to-index { font-size: 16px; color: #0055aa; }

    </style>
</head>
<body id="top">

    <div class="jump-link">
        <a href="#footer">▼ 下へ</a>
    </div>

    <h1 class="content-title">第一話：色彩の定義</h1>

    <div class="novel-body">ここに本文を貼り付けます。
改行もそのまま反映されます。
<p>などは不要です。</div>

    <div class="bottom-nav" id="footer">
        <a href="#top" class="go-top">▲ ページの上へ</a>
        <a href="ginnno.html" class="back-to-index">目次に戻る</a>
    </div>

</body>
</html>
