<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田中の部屋</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: sans-serif; 
            line-height: 1.8; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            color: #222; 
            background: #fff; 
        }
        
        /* 1. 看板：サイズを少し上げ(36px)、存在感を強化 */
        .site-title { 
            font-family: "Zen Maru Gothic", sans-serif;
            text-align: center; 
            font-size: 36px; 
            margin-top: 50px;
            color: #f8b500;
            text-shadow: 
                -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff,
                -4px -4px 0 #f8b500, 4px -4px 0 #f8b500, -4px 4px 0 #f8b500, 4px 4px 0 #f8b500;
        }
        
        /* 2. 概要：前の読みやすかった太さに戻す */
        .intro { text-align: center; margin: 30px 0; font-size: 16px; }
        .intro span { display: inline-block; }

        .animal-line { 
            text-align: left; 
            margin-bottom: -10px; 
            padding-left: 25px; 
            font-size: 28px; 
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .border-main { 
            border: 0; 
            border-top: 3px solid #666; 
            border-radius: 2px;
            margin: 0 0 30px 0; 
        }

        /* 3. 中ゾーン：概要と同じ16pxで箇条書き */
        .category { text-align: left; margin-bottom: 40px; }
        .category h2 { font-size: 20px; padding-left: 12px; border-left: 12px solid #f8b500; line-height: 1.2; margin-bottom: 15px; }
        .category ul { list-style: disc; padding-left: 40px; } /* 箇条書きスタイル */
        .category li { margin: 10px 0; font-size: 16px; } /* 概要と同じサイズ */
        .category a { text-decoration: none; color: #0055aa; font-weight: bold; }

        /* 4. 下ゾーン：色の濃淡を再定義 */
        .archive-zone { border-top: 1px solid #eee; padding-top: 30px; margin-top: 60px; }
        
        .dabun-label { font-size: 16px; color: #777; margin-bottom: 48px; }

        /* 城の完成：ここを基準に少し薄く */
        .archive-heading { font-size: 20px; font-weight: bold; color: #555; margin-bottom: 28px; padding-left: 1em; } 

        /* 駄文本文：城の完成より「無意識レベル」で薄いが
