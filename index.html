    <style>
        /* 基本：目に優しいゴシック体 */
        body { font-family: sans-serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; background: #fff; }
        
        /* 1. サイトタイトル：あの頃の赤文字 */
        .site-title { 
            text-align: center; font-size: 32px; margin-top: 50px;
            color: #ff0000; /* 純粋な赤 */
            font-weight: bold;
        }
        
        .intro { text-align: center; margin: 30px 0; font-size: 16px; }
        .intro span { display: inline-block; }

        /* 2. 動物の行進（DESERTS）：ボーダーの左端 */
        .animal-line { text-align: left; margin-bottom: -10px; padding-left: 5px; }
        .animal-line img { width: 40px; height: auto; margin-right: 2px; vertical-align: bottom; }

        /* 3. ボーダー：黒い太線 */
        .border-main { border: 0; border-top: 6px solid #000; margin: 0 0 30px 0; }

        /* 4. 中ゾーン：山吹色の太短い棒 */
        .category { text-align: left; margin-bottom: 40px; }
        .category h2 { font-size: 20px; padding-left: 12px; border-left: 12px solid #f8b500; line-height: 1.2; margin-bottom: 15px; }
        .category ul { list-style: none; padding: 0; }
        .category li { margin: 10px 0; font-size: 18px; }
        .category a { text-decoration: none; color: #0055aa; font-weight: bold; }

        /* 5. 下ゾーン：駄文コーナー */
        .archive-zone { border-top: 1px solid #eee; padding-top: 30px; margin-top: 60px; font-size: 15px; color: #666; }

        /* 6. 最下部：右端のキツネ（AI絵コーナー） */
        .fox-exit { text-align: right; margin-top: 40px; }
        .fox-exit img { width: 45px; height: auto; cursor: pointer; }

        /* 7. 作成日時：真ん中寄せ・薄い色 */
        .footer-date { text-align: center; margin-top: 10px; font-size: 14px; color: #bbb; }
    </style>
</head>
